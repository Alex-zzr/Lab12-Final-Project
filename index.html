<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小组个人网站 · 三人团队</title>
    <style>
        /* ----- 全局重置 & 字体 ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f0f5fa 0%, #dce6ef 100%);
            min-height: 100vh;
            padding: 2.5rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 3rem;
            padding: 2.8rem 2rem;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.7);
            text-align: center;
        }

        .team-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0b2a3e;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .team-sub {
            color: #2c5777;
            font-size: 1rem;
            margin-bottom: 2.5rem;
            opacity: 0.8;
        }

        /* ----- 三列网格 ----- */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }

        /* ----- 单个成员卡片 ----- */
        .member-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 2rem 1.5rem 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .member-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0, 20, 40, 0.08);
        }

        /* ----- 头像 ----- */
        .photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 1.2rem;
            background: #d0dce8;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 6px 16px rgba(0,0,0,0.04);
            font-size: 0.8rem;
            color: #3a5e7a;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 占位文字（临时） */
        .photo-placeholder-text {
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        /* ----- 姓名 ----- */
        .member-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0b1e2e;
            margin-bottom: 0.3rem;
        }

        /* ----- 个人简介 ----- */
        .member-bio {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #1d3f57;
            background: rgba(255, 255, 255, 0.4);
            padding: 0.8rem 1rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            margin-top: 0.8rem;
            text-align: left;
        }

        .member-bio p {
            margin-bottom: 0.5rem;
        }

        .member-bio p:last-child {
            margin-bottom: 0;
        }

        /* ----- 响应式：平板 & 手机 ----- */
        @media (max-width: 900px) {
            .members-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 1.8rem 1rem;
                border-radius: 2rem;
            }
            .members-grid {
                grid-template-columns: 1fr;
                gap: 1.8rem;
            }
            .team-title {
                font-size: 2rem;
            }
            .photo {
                width: 100px;
                height: 100px;
            }
            .member-name {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
